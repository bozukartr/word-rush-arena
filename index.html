<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#090b18">
  <meta name="description" content="Word Rush Arena — gerçek zamanlı kelime düellosu.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <title>Word Rush Arena</title>
</head>
<body>
  <div class="ambient ambient-a"></div><div class="ambient ambient-b"></div>
  <main class="app-shell">
    <header class="brand-bar">
      <button id="leaveButton" class="icon-button hidden" type="button" aria-label="Odadan çık">‹</button>
      <div class="mini-brand"><strong>WRA</strong></div>
      <div class="header-status">
        <div id="diamondBadge" class="diamond-badge hidden">◇ <b id="diamondText">0</b></div>
        <div id="coinBadge" class="coin-badge hidden">◆ <b id="coinText">0</b></div>
        <button id="profileButton" class="profile-button hidden" type="button" aria-label="Profil">●</button>
        <div id="connectionBadge" class="connection-badge" aria-live="polite"><i></i><span>Bağlanıyor</span></div>
      </div>
    </header>

    <section id="loadingScreen" class="screen active loading-screen">
      <div class="logo-orbit"><span>W</span></div>
    </section>

    <section id="homeScreen" class="screen home-screen">
      <div class="home-mark">W</div>
      <h1>Word Rush</h1>
      <p class="home-subtitle">75 saniyelik kelime düellosu</p>
      <div class="panel home-panel">
        <button id="googleLoginButton" class="button google-button" type="button"><span>G</span> GOOGLE İLE GİRİŞ</button>
        <button id="quickMatchButton" class="button button-gold" type="button" disabled>QUICK MATCH</button>
        <p id="quickMatchStatus" class="quick-match-status"></p>
        <input id="playerName" maxlength="18" autocomplete="nickname" placeholder="Oyuncu adı">
        <button id="createRoomButton" class="button button-primary" type="button">ODA KUR</button>
        <div class="separator"><span>veya</span></div>
        <div class="join-row">
          <input id="roomCodeInput" class="code-input" maxlength="5" autocomplete="off" placeholder="12345" inputmode="numeric" pattern="[0-9]*">
          <button id="joinRoomButton" class="button button-secondary" type="button">KATIL</button>
        </div>
      </div>
    </section>

    <section id="profileScreen" class="screen profile-screen">
      <div class="profile-head">
        <button id="profileBackButton" class="icon-button solid" type="button" aria-label="Geri">‹</button>
        <strong>PROFİL</strong>
      </div>
      <div class="profile-card">
        <img id="profileAvatar" class="profile-avatar" alt="">
        <h2 id="profileName">Oyuncu</h2>
        <div class="profile-code">KOD <b id="profileCode">------------</b></div>
        <div class="profile-wallet">
          <div><span>◆</span><b id="profileCoins">0</b><small>JETON</small></div>
          <div class="diamond"><span>◇</span><b id="profileDiamonds">0</b><small>ELMAS</small></div>
        </div>
      </div>
      <div class="friend-add">
        <input id="friendCodeInput" maxlength="12" autocomplete="off" placeholder="ARKADAŞ KODU">
        <button id="addFriendButton" type="button">EKLE</button>
      </div>
      <div id="friendRequests" class="friend-list requests"></div>
      <div id="friendList" class="friend-list"></div>
      <button id="logoutButton" class="text-button hidden" type="button">Çıkış yap</button>
    </section>

    <section id="lobbyScreen" class="screen lobby-screen">
      <div class="room-code-card">
        <span>ODA</span>
        <button id="copyCodeButton" type="button" aria-label="Oda kodunu kopyala">
          <strong id="roomCodeText">-----</strong><small>⧉</small>
        </button>
      </div>
      <div class="section-heading"><div><span>OYUNCULAR</span><strong id="playerCount">0 / 4</strong></div></div>
      <div id="lobbyPlayers" class="player-list"></div>
      <div class="lobby-actions">
        <button id="readyButton" class="button button-primary" type="button">HAZIRIM</button>
        <button id="startButton" class="button button-gold hidden" type="button" disabled>BAŞLAT</button>
      </div>
    </section>

    <section id="gameScreen" class="screen game-screen">
      <div class="hud">
        <div class="hud-card"><span>SÜRE</span><strong id="timerText">75</strong></div>
        <div class="rank-strip" id="scoreStrip"></div>
        <div class="hud-card"><span>SIRA</span><strong id="rankText">–</strong></div>
      </div>
      <div class="status-line"><span id="gameStatus">Harfleri seç</span><div class="status-meta"><span id="stockText" class="stock-count">KALAN –</span><b id="comboText"></b></div></div>
      <div class="combat-bar"><button id="attackButton" class="attack-button" type="button" disabled>A KİLİTLE · 25</button></div>
      <div id="letterGrid" class="letter-grid" aria-label="Harf havuzu"></div>
      <div class="word-composer">
        <div id="currentWord" class="current-word" aria-live="polite"><span>Kelime</span></div>
        <div class="composer-tools">
          <button id="shuffleButton" class="icon-button solid" type="button" aria-label="Harfleri karıştır" title="Harfleri karıştır">⟳</button>
          <button id="backspaceButton" class="icon-button solid" type="button" aria-label="Son harfi sil">⌫</button>
          <button id="clearButton" class="icon-button solid" type="button" aria-label="Temizle">×</button>
        </div>
      </div>
      <button id="submitWordButton" class="button button-primary submit-button" type="button" disabled>GÖNDER</button>
      <div id="recentWords" class="recent-words"></div>
      <div id="attackPicker" class="attack-picker hidden" role="dialog" aria-modal="true" aria-label="Rakip seç">
        <div class="attack-sheet">
          <div class="attack-sheet-head"><strong>HEDEF</strong><button id="closeAttackButton" class="icon-button solid" type="button" aria-label="Kapat">×</button></div>
          <div id="attackTargets" class="attack-targets"></div>
        </div>
      </div>
    </section>

    <section id="resultsScreen" class="screen results-screen">
      <div class="trophy">★</div>
      <h2 id="winnerText">Kazanan!</h2>
      <p id="rewardText" class="reward-text"></p>
      <div id="resultsList" class="results-list"></div>
      <button id="rematchButton" class="button button-gold hidden" type="button">TEKRAR OYNA</button>
      <p id="rematchStatus" class="rematch-status"></p>
      <button id="homeButton" class="text-button" type="button">Ana menü</button>
    </section>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
